<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Registros</title>
    <style>
        /* 1. Arquitectura de UI: Centrado y fondo */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #b2ff59; /* Verde claro brillante */
            margin: 0;
            /* Flexbox para centrar contenido vertical y horizontalmente */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Contenedor tipo tarjeta para que los controles resalten */
        .tarjeta-busqueda {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        .controles {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Espaciado uniforme entre elementos */
            margin-bottom: 20px;
            margin-top: 20px;
        }

        input, select, button {
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #4caf50; /* Resalta en verde al seleccionar */
        }

        button {
            background-color: #4caf50;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #388e3c;
        }

        .usuario {
            background: #f9f9f9;
            margin: 10px 0;
            padding: 15px;
            border-left: 5px solid #4caf50;
            border-radius: 4px;
            text-align: left;
            font-size: 14px;
        }

        /* Scroll interno si hay muchos resultados */
        #contenedor-datos {
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="tarjeta-busqueda">
        <h2>Consultar Base de Datos</h2>
        
        <div class="controles">
            <input type="text" id="valorBusqueda" placeholder="Escribe el valor a buscar...">
            
            <select id="columnaBusqueda">
                <option value="Nombre">Nombre</option>
                <option value="CURP">CURP</option>
                <option value="Folio">Folio</option>
            </select>
            
            <button onclick="ejecutarBusqueda()">Buscar registro</button>
        </div>

        <div id="contenedor-datos">
            <!-- Los resultados aparecerán aquí -->
        </div>
    </div>
<script>
        // Pega aquí la URL de tu NUEVO despliegue
        const API_URL = 'https://script.google.com/macros/s/AKfycbzJkOHgu8qco1BrGkHUEgnvvimcmNPDOXH_OvbNAbwKMpLg8lJzANa3ELqp9jLR2uR1Ug/exec';

        async function ejecutarBusqueda() {
            const valor = document.getElementById('valorBusqueda').value.trim();
            const columna = document.getElementById('columnaBusqueda').value;
            const contenedor = document.getElementById('contenedor-datos');

            if (!valor) {
                contenedor.innerHTML = '<p style="color: #d32f2f;">Por favor, ingresa un valor.</p>';
                return;
            }

            contenedor.innerHTML = '<p>Buscando en el servidor...</p>';

            try {
                // Construimos la URL con los parámetros de búsqueda
                // encodeURIComponent asegura que espacios o caracteres especiales no rompan la URL
                const urlDeBusqueda = `${API_URL}?columna=${columna}&valor=${encodeURIComponent(valor)}`;
                
                const respuesta = await fetch(urlDeBusqueda);
                if (!respuesta.ok) throw new Error('Error en la red');
                
                const resultados = await respuesta.json();

                // Limpiar resultados anteriores
                contenedor.innerHTML = '';

                if (resultados.length === 0) {
                    contenedor.innerHTML = '<p>No se encontraron registros.</p>';
                    return;
                }

                // Renderizar los resultados con las nuevas columnas A, B, C, D, E
                // ... dentro de ejecutarBusqueda, donde procesas los resultados ...
contenedor.innerHTML = `
    <div style="overflow-x: auto;">
        <table border="1" style="width:100%; border-collapse: collapse; font-size: 12px; text-align: left;">
            <thead>
                <tr style="background: #e0e0e0;">
                    <th>T</th><th>S</th><th>B</th><th>D</th><th>F</th><th>G</th><th>M</th><th>R</th><th>Q</th>
                </tr>
            </thead>
            <tbody id="tabla-body"></tbody>
        </table>
    </div>
`;

const tablaBody = document.getElementById('tabla-body');
resultados.forEach(fila => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
        <td>${fila.T}</td><td>${fila.S}</td><td>${fila.B}</td>
        <td>${fila.D}</td><td>${fila.F}</td><td>${fila.G}</td>
        <td>${fila.M}</td><td>${fila.R}</td><td>${fila.Q}</td>
    `;
    tablaBody.appendChild(tr);
});
    </script>
  
</body>
</html>
