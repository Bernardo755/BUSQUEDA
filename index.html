 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Registros</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Fondo RGB 30-91-79 */
            background-color: rgb(30, 91, 79); 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
       }

        /* AJUSTE APLICADO: La imagen ocupa el 50% del ancho del contenedor */
        .logo-app {
            width: 50%; 
            height: auto; /* Mantiene la proporción para no deformarse */
            margin-bottom: 20px;
        }
        .tarjeta-busqueda {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            width: 95%;
            max-width: 900px;
            text-align: center;
        }

      

        .controles {
            display: flex;
            flex-direction: row;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        input, select, button {
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            /* Botón RGB 156-35-72 */
            background-color: rgb(156, 35, 72);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover { 
            background-color: rgb(120, 25, 55); 
        }

        .contenedor-tabla {
            overflow-x: auto;
            margin-top: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            background: rgb(30, 91, 79); /* Encabezados a juego */
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #eee;
            white-space: nowrap;
        }

        tr:hover { background-color: #f1f8e9; }
    </style>
</head>
<body>

    <div class="tarjeta-busqueda">
        <!-- Reemplaza el src con la URL de tu imagen -->
        <img src="LOG123.png" alt="Logo" class="logo-app">
     
        
        <h2>Buscador de Registros</h2>
        
        <div class="controles">
            <input type="text" id="valorBusqueda" placeholder="Valor a buscar...">
            <select id="columnaBusqueda">
                <option value="Nombre">Nombre</option>
                <option value="CURP">CURP</option>
                <option value="Folio">Folio</option>
            </select>
            <button onclick="ejecutarBusqueda()">Buscar</button>
        </div>

        <div id="contenedor-resultados"></div>
    </div>

    <script>
        // ¡IMPORTANTE! Cambia esta URL por la de tu nuevo despliegue
        const API_URL = 'https://script.google.com/macros/s/AKfycbzLjfvqwU1LN8krJvgs3XoOxK7ONrObUyy0qtY9oSb9xmiufu20VZ4BME6wbYv6O3UdAA/exec';

        async function ejecutarBusqueda() {
            const valor = document.getElementById('valorBusqueda').value.trim();
            const columna = document.getElementById('columnaBusqueda').value;
            const contenedor = document.getElementById('contenedor-resultados');

            if (!valor) return alert("Por favor ingresa un valor");

            contenedor.innerHTML = '<p>Consultando servidor...</p>';

            try {
                const response = await fetch(`${API_URL}?columna=${columna}&valor=${encodeURIComponent(valor)}`);
                const resultados = await response.json();

                if (resultados.length === 0) {
                    contenedor.innerHTML = '<p>No se encontraron registros.</p>';
                    return;
                }

                let html = `
                    <div class="contenedor-tabla">
                        <table>
                            <thead>
                                <tr>
                                    <th>T</th><th>S</th><th>B</th><th>D</th><th>F</th><th>G</th><th>M</th><th>R</th><th>Q</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-body"></tbody>
                        </table>
                    </div>
                `;
                contenedor.innerHTML = html;

                const tbody = document.getElementById('tabla-body');
                resultados.forEach(f => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${f.T}</td><td>${f.S}</td><td>${f.B}</td>
                        <td>${f.D}</td><td>${f.F}</td><td>${f.G}</td>
                        <td>${f.M}</td><td>${f.R}</td><td>${f.Q}</td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (error) {
                contenedor.innerHTML = '<p style="color:red;">Error al conectar con la base de datos.</p>';
            }
        }
    </script>
</body>
</html>
