<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Búsqueda Seguro</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: rgb(30, 91, 79); 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .tarjeta {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            text-align: center;
            width: 95%;
            max-width: 900px;
        }
        .logo-app {
            width: 50%; 
            height: auto;
            margin-bottom: 20px;
            background-color: white;
            border-radius: 8px;
        }
        
        /* Contenedores de secciones */
        #login-section { display: block; max-width: 400px; margin: 0 auto; }
        #app-section { display: none; }

        .controles, .login-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }
        .controles-busqueda {
            display: flex;
            flex-direction: row;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        input, select, button {
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        button {
            background-color: rgb(156, 35, 72);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background-color: rgb(120, 25, 55); }
        .btn-logout { background-color: #555; margin-top: 20px; width: 100%;}
        .btn-logout:hover { background-color: #333; }

        .contenedor-tabla { overflow-x: auto; margin-top: 20px; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: rgb(30, 91, 79); color: white; padding: 12px; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid #eee; white-space: nowrap; }
        tr:hover { background-color: #f1f8e9; }
    </style>
</head>
<body>

    <!-- SECCIÓN DE LOGIN -->
    <div id="login-section" class="tarjeta">
        <!-- Reemplaza el contenido de src con el Base64 de tu imagen real para ocultarla del inspector -->
        <img src="LOG12.png" alt="Logo" class="logo-app">
        <h2>Acceso al Sistema</h2>
        <div class="login-form">
            <input type="text" id="user" placeholder="Usuario">
            <input type="password" id="pass" placeholder="Contraseña">
            <button onclick="iniciarSesion()">Entrar</button>
        </div>
        <div id="login-mensaje" style="color: red; font-weight: bold; margin-top: 10px;"></div>
    </div>

    <!-- SECCIÓN DE BÚSQUEDA -->
    <div id="app-section" class="tarjeta">
        <!-- Misma imagen Base64 -->
        <img src="LOG12.png" alt="Logo" class="logo-app">
        <h2>Buscador de Registros</h2>
        
        <div class="controles-busqueda">
            <input type="text" id="valorBusqueda" placeholder="Valor a buscar...">
            <select id="columnaBusqueda">
                <option value="Nombre">Nombre</option>
                <option value="CURP">CURP</option>
                <option value="Folio">Folio</option>
            </select>
            <button onclick="ejecutarBusqueda()">Buscar</button>
        </div>

        <div id="contenedor-resultados"></div>
        <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>

    <script>
        // PEGA AQUÍ LA NUEVA URL DE TU IMPLEMENTACIÓN DE GOOGLE APPS SCRIPT
        const API_URL = 'https://script.google.com/macros/s/AKfycbzfAsXZ-8MO9xfSKN6xfy03-lSIgKAAHZS3mZxizJI9Oc1iZUgtmeFEdhrQd9L4Kfuq_g/exec';
        
        let usuarioActual = ""; 
        let datosDispositivo = { ip: "Obteniendo...", ubicacion: "Obteniendo..." };

        // OBTENER IP Y UBICACIÓN AUTOMÁTICAMENTE AL ABRIR LA PÁGINA
        window.onload = async function() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                datosDispositivo.ip = data.ip || "No disponible";
                datosDispositivo.ubicacion = data.city ? `${data.city}, ${data.region}, ${data.country_name}` : "No disponible";
            } catch (error) {
                datosDispositivo.ip = "No disponible";
                datosDispositivo.ubicacion = "No disponible";
            }
        };

        // FUNCIÓN CENTRAL PARA ENVIAR DATOS A GOOGLE SCRIPT
        async function enviarPeticion(datos) {
            datos.ip = datosDispositivo.ip;
            datos.ubicacion = datosDispositivo.ubicacion;

            const respuesta = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify(datos),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' } 
            });
            return await respuesta.json();
        }

        async function iniciarSesion() {
            const user = document.getElementById('user').value.trim();
            const pass = document.getElementById('pass').value.trim();
            const msj = document.getElementById('login-mensaje');

            if (!user || !pass) {
                msj.innerText = "Por favor, llena ambos campos.";
                return;
            }
            
            msj.innerText = "Verificando credenciales...";

            try {
                const res = await enviarPeticion({ action: "login", usuario: user, password: pass });
                
                if (res.exito) {
                    usuarioActual = user;
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('app-section').style.display = 'block';
                    document.getElementById('user').value = '';
                    document.getElementById('pass').value = '';
                    msj.innerText = "";
                } else {
                    msj.innerText = res.error;
                }
            } catch (e) {
                msj.innerText = "Error de conexión con la base de datos.";
            }
        }

        async function ejecutarBusqueda() {
            const valor = document.getElementById('valorBusqueda').value.trim();
            const columna = document.getElementById('columnaBusqueda').value;
            const contenedor = document.getElementById('contenedor-resultados');

            if (!valor) return alert("Por favor ingresa un valor para buscar.");
            contenedor.innerHTML = '<p style="font-weight:bold; color: #555;">Consultando servidor...</p>';

            try {
                const resultados = await enviarPeticion({ 
                    action: "buscar", 
                    usuario: usuarioActual, 
                    columna: columna, 
                    valor: valor 
                });

                if (resultados.length > 0 && resultados[0].error) {
                    contenedor.innerHTML = `<p style="color:red; font-weight:bold;">${resultados[0].error}</p>`;
                    return;
                }

                if (resultados.length === 0) {
                    contenedor.innerHTML = '<p>No se encontraron registros.</p>';
                    return;
                }

                let html = `
                    <div class="contenedor-tabla">
                        <table>
                            <thead>
                                <tr>
                                    <th>NOMBRE</th><th>ESTATUS</th><th>SARE</th><th>NIVEL</th><th>CCT</th><th>ESCUELA</th><th>MUNICIPIO</th><th>CURP</th><th>MES_REMESA</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-body"></tbody>
                        </table>
                    </div>
                `;
                contenedor.innerHTML = html;

                const tbody = document.getElementById('tabla-body');
                resultados.forEach(f => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${f.NOMBRE || ""}</td>
                        <td>${f.ESTATUS || ""}</td>
                        <td>${f.SARE || ""}</td>
                        <td>${f.MUNICIPIO || ""}</td>
                        <td>${f.CCT || ""}</td>
                        <td>${f.ESCUELA || ""}</td>
                        <td>${f.NIVEL || ""}</td>
                        <td>${f.CURP || ""}</td>
                        <td>${f.MES_REMESA || ""}</td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (error) {
                contenedor.innerHTML = '<p style="color:red;">Error al recibir los datos.</p>';
            }
        }

        async function cerrarSesion() {
            if(usuarioActual) {
                document.getElementById('contenedor-resultados').innerHTML = '<p>Cerrando sesión...</p>';
                await enviarPeticion({ action: "logout", usuario: usuarioActual });
            }
            usuarioActual = "";
            document.getElementById('contenedor-resultados').innerHTML = '';
            document.getElementById('valorBusqueda').value = '';
            document.getElementById('app-section').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
        }
    </script>
</body>
</html>
